<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ByteCrisp - Innovative software solutions for modern businesses. Custom software, web & mobile apps, cloud solutions and UI/UX design." />
    <meta name="author" content="ByteCrisp" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>ByteCrisp - Software Development Agency</title>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0c16;
        transition: opacity 0.4s ease;
      }
      #preloader.preloader-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #preloader img {
        width: 44px;
        height: 44px;
        animation: preloader-pulse 1.1s ease-in-out infinite;
      }
      #preloader span {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        color: #f2f3f9;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 0.85rem;
      }
      @keyframes preloader-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.88); opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <img src="/logo.png" alt="" />
      <span>ByteCrisp</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var el = document.getElementById('preloader')
          if (!el) return
          el.classList.add('preloader-hidden')
          el.addEventListener('transitionend', function () {
            el.remove()
          })
        }, 350)
      })
    </script>
  </body>
</html>
